services:
  - type: web
    name: rebuy-ai-chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python chatbot.py
    envVars:
      - key: CHATBOT_PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
